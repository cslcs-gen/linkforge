<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkForge</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app" aria-labelledby="game-title">
  <div class="shell">

    <div class="header">
      <div class="header-top">
        <div>
          <p class="eyebrow">Daily links puzzle</p>
          <h1 id="game-title">LinkForge</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="Reset puzzle" title="Reset puzzle">
          &#8635;
        </button>
      </div>
    </div>

    <div class="body">

      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-label">Groups found</span>
          <strong id="groupsFound">0/4</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Mistakes left</span>
          <strong id="mistakesLeft">4</strong>
        </div>
      </div>

      <p class="status" id="status" aria-live="polite">Select four connected tiles.</p>
      <div class="hint-box" id="hintBox" aria-live="polite" hidden>
        <span class="hint-icon">&#128161;</span>
        <span id="hintText"></span>
      </div>

      <div class="solved-groups" id="solvedGroups" aria-label="Solved groups"></div>
      <div class="tile-grid" id="tileGrid" aria-label="Puzzle tiles"></div>

      <div class="actions">
        <button class="btn-secondary" id="shuffleButton" type="button">Shuffle</button>
        <button class="btn-secondary" id="clearButton" type="button">Clear</button>
        <button class="btn-primary" id="submitButton" type="button">Submit</button>
      </div>

      <div class="footer-panel">
        <img
          class="visitor-badge"
          src="https://hits.sh/linkforge.buildjoynow.com.svg?label=Visitors&color=157f72&labelColor=f9fafb"
          alt="Visitors count"
        >
        <span class="copyright">Copyright 2026 buildjoynow.com. All rights reserved.</span>
        <span class="version">v1.02</span>
      </div>

    </div>
  </div>
</main>

<!-- Next puzzle modal -->
<div class="modal-overlay" id="nextModal" hidden>
  <div class="modal-card">
    <div class="modal-icon">&#127381;</div>
    <h2>Puzzle complete!</h2>
    <p id="modalSub">All 4 links forged. Ready for the next one?</p>
    <button class="btn-primary modal-btn" id="nextPuzzleBtn" type="button">Next Puzzle &rarr;</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
