<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkForge</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app" aria-labelledby="game-title">
  <div class="app-stack">
    <section class="game-shell">
      <div class="topbar">
        <div>
          <p class="eyebrow">Daily links puzzle</p>
          <h1 id="game-title">LinkForge</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="Reset puzzle" title="Reset puzzle">
          <span aria-hidden="true">&#8635;</span>
        </button>
      </div>

      <div class="summary">
        <div>
          <span class="summary-label">Groups found</span>
          <strong id="groupsFound">0/4</strong>
        </div>
        <div>
          <span class="summary-label">Mistakes left</span>
          <strong id="mistakesLeft">4</strong>
        </div>
      </div>

      <p class="status" id="status" aria-live="polite">Select four connected tiles.</p>
      <p class="hint" id="hintText" aria-live="polite"></p>

      <div class="solved-groups" id="solvedGroups" aria-label="Solved groups"></div>
      <div class="tile-grid" id="tileGrid" aria-label="Puzzle tiles"></div>

      <div class="actions">
        <button class="secondary" id="shuffleButton" type="button">Shuffle</button>
        <button class="secondary" id="clearButton" type="button">Clear</button>
        <button class="primary" id="submitButton" type="button">Submit</button>
      </div>

      <div class="visitor-panel" aria-label="Visitor count">
        <img
          class="visitor-badge"
          src="https://hits.sh/linkforge.buildjoynow.com.svg?label=Visitors&color=157f72&labelColor=f9fafb"
          alt="Visitors count"
        >
        <span class="visitor-copyright">Copyright 2026 buildjoynow.com. All rights reserved.</span>
        <span class="visitor-version">v1.01</span>
      </div>
    </section>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
